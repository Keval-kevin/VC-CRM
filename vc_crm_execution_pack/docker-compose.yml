services:
  postgres:
    image: postgres:15-alpine
    container_name: vc-crm-postgres
    environment:
      POSTGRES_DB: vc_crm
      POSTGRES_USER: vc_crm
      POSTGRES_PASSWORD: vc_crm_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vc_crm -d vc_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vc-crm-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: vc-crm-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: vc_crm_minio
      MINIO_ROOT_PASSWORD: vc_crm_minio_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
