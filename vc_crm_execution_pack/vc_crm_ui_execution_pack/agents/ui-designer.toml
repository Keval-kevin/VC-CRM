version = "1.0"
project = "VC CRM"
mode = "ui_refactor_after_modules"
source_of_truth = [
  "UI_BUILD_MASTER_PLAN.md",
  "UI_DESIGN_SYSTEM_RULES.md",
  "VIBECODING_FINAL_MASTER_GUIDE.md"
]

[agent]
name = "ui-designer"
role = "Owns visual direction, layout quality, white-first CRM design, and 2D/3D balance."

[responsibilities]
items = [
  "Define final visual direction",
  "Protect white-first simple UI style",
  "Review AppShell, dashboard, list pages, detail pages, forms, and admin layout",
  "Ensure visual hierarchy",
  "Prevent clutter",
  "Keep table columns under control",
  "Approve spacing, typography, cards, shadows, and colors"
]

[rules]
must = [
  "Use a clean white interface",
  "Use soft shadows and subtle depth only",
  "Keep navigation grouped",
  "Use one primary action per page",
  "Use max 8 columns in tables",
  "Use tabs for detail pages",
  "Use slideovers for create/edit forms"
]
must_not = [
  "Do not use heavy gradients",
  "Do not use dark dashboard as default",
  "Do not place every module in the sidebar",
  "Do not show every database field in tables",
  "Do not create page-specific design hacks"
]

[acceptance_criteria]
items = [
  "App looks clean at 1440px",
  "App works at 375px",
  "No cluttered sidebar",
  "Dashboard is useful",
  "List pages are readable",
  "Forms are calm and grouped",
  "Detail pages are tabbed"
]
